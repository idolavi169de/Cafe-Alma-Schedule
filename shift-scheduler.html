<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: #e8e2d4;
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(74,124,63,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(74,124,63,0.07) 0%, transparent 45%),
    radial-gradient(ellipse at 60% 85%, rgba(139,90,43,0.06) 0%, transparent 50%);
  color: #2c1a0e;
  min-height: 100vh;
}

h1, h2, h3, h4 { font-family: 'Lora', Georgia, serif; }

/* ── Layout ── */
.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.card {
  background: #faf7f0;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(80,45,10,0.12);
  border: 1px solid rgba(180,148,100,0.22);
  padding: 36px 40px;
  width: 100%;
  max-width: 640px;
}

.card-wide { max-width: 900px; }

h1 { font-size: 1.7rem; font-weight: 700; }
h2 { font-size: 1.25rem; font-weight: 600; }
h3 { font-size: 1.05rem; font-weight: 600; }
p  { line-height: 1.55; }

/* ── Header bar ── */
.topbar {
  width: 100%;
  background: #2a4a1c;
  background-image: linear-gradient(135deg, #2a4a1c 0%, #3d6b2e 100%);
  color: #e8f5e0;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 1rem;
  font-weight: 600;
  font-family: 'Lora', Georgia, serif;
  border-bottom: 2px solid rgba(180,220,140,0.18);
}
.topbar .back-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #e8f5e0;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  margin-left: auto;
}
.topbar .back-btn:hover { background: rgba(255,255,255,0.22); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .15s, transform .1s;
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-blue   { background: #3d6b2e; color: #f0f7ea; }
.btn-amber  { background: #b07828; color: #fff8ec; }
.btn-green  { background: #2a5220; color: #e8f5e0; }
.btn-red    { background: #8b3a2a; color: #fff0ec; }
.btn-indigo { background: #6b4226; color: #fff4ec; }
.btn-ghost  { background: #e4ddd0; color: #5a3e28; }
.btn-large  { padding: 18px 32px; font-size: 1.1rem; border-radius: 14px; width: 100%; justify-content: center; }
.btn-sm     { padding: 7px 16px; font-size: 0.83rem; border-radius: 8px; }

/* ── Home Screen ── */
.home-hero {
  text-align: center;
  margin-bottom: 40px;
}
.home-icon { font-size: 4rem; margin-bottom: 12px; filter: drop-shadow(0 2px 8px rgba(74,124,63,0.3)); }
.home-month { color: #7a5c3a; font-size: 1rem; margin-top: 6px; font-style: italic; font-family: 'Lora', serif; }
.home-actions { display: flex; flex-direction: column; gap: 14px; }
.worker-badge {
  text-align: center;
  color: #64748b;
  font-size: 0.88rem;
  margin-top: 18px;
}

/* ── Form ── */
.field { margin-bottom: 22px; }
.field label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 7px; color: #4a3220; }
.field input, .field select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #c8b898;
  border-radius: 9px;
  font-size: 0.95rem;
  outline: none;
  background: #fdf9f3;
  color: #2c1a0e;
  transition: border-color .15s;
  font-family: 'Inter', sans-serif;
}
.field input:focus, .field select:focus { border-color: #3d6b2e; box-shadow: 0 0 0 3px rgba(61,107,46,0.10); }
.field .hint { font-size: 0.8rem; color: #9a8068; margin-top: 5px; }

/* ── Calendar ── */
.cal-legend {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  font-size: 0.83rem;
}
.cal-legend span {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #475569;
}
.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}
.dot-red    { background: #8b3a2a; }
.dot-amber  { background: #b07828; }
.dot-indigo { background: #6b4226; }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 6px;
}
.day-header {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 700;
  color: #94a3b8;
  padding: 6px 0;
}
.day-cell {
  aspect-ratio: 1;
  border-radius: 9px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
  position: relative;
  user-select: none;
  min-height: 46px;
}
.day-cell.empty { cursor: default; }
.day-cell.normal { background: #f0ebe0; color: #5a3e28; }
.day-cell.normal:hover { border-color: #3d6b2e; background: #e8f0e0; color: #2a4a1c; }
.day-cell.unavailable { background: #f5e8e4; border-color: #8b3a2a; color: #6b2010; }
.day-cell.morning { background: #f5f0e0; border-color: #b07828; color: #7a4e10; }
.day-cell.afternoon { background: #f0e8e0; border-color: #6b4226; color: #4a2810; }
.day-cell .day-num { font-size: 0.85rem; }
.day-cell .day-label {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ── Popover ── */
#popover {
  position: fixed;
  background: #faf7f0;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(80,45,10,0.20);
  border: 1px solid rgba(180,148,100,0.3);
  padding: 10px;
  z-index: 1000;
  display: none;
  flex-direction: column;
  gap: 5px;
  min-width: 190px;
}
#popover.visible { display: flex; }
.pop-btn {
  padding: 9px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.87rem;
  font-weight: 600;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: opacity .15s;
}
.pop-btn:hover { opacity: 0.82; }
.pop-unavail  { background: #f5e8e4; color: #6b2010; }
.pop-morning  { background: #f5f0e0; color: #7a4e10; }
.pop-afternoon { background: #f0e8e0; color: #4a2810; }
.pop-clear    { background: #ede8dc; color: #5a3e28; }
.pop-close    { position: absolute; top: 6px; right: 8px; background: none; border: none; cursor: pointer; color: #b09070; font-size: 1rem; }

/* ── Review summary ── */
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid #e8e0d0;
  font-size: 0.9rem;
}
.summary-row:last-child { border-bottom: none; }
.tag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
  margin: 2px;
}
.tag-red    { background: #f5e8e4; color: #6b2010; }
.tag-amber  { background: #f5f0e0; color: #7a4e10; }
.tag-indigo { background: #f0e8e0; color: #4a2810; }

/* ── Employer tabs ── */
.tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid #d4c9b0;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.tab {
  padding: 10px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  border: none;
  background: none;
  cursor: pointer;
  color: #8a6a4a;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  border-radius: 6px 6px 0 0;
  transition: color .15s;
  font-family: 'Lora', serif;
}
.tab.active { color: #3d6b2e; border-bottom-color: #3d6b2e; }
.tab:hover:not(.active) { color: #2a4a1c; background: #f0ebe0; }

/* ── Employer tables ── */
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th {
  background: #3d6b2e;
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  color: #e8f5e0;
  border-bottom: 2px solid #2a4a1c;
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-family: 'Lora', serif;
}
td { padding: 10px 12px; border-bottom: 1px solid #e8e0d0; vertical-align: top; color: #2c1a0e; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f5f0e5; }

/* ── Dispute cards ── */
.dispute-card {
  background: #f8f0e8;
  border: 1.5px solid #c8a070;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 14px;
}
.dispute-card h4 { color: #7a3810; margin-bottom: 8px; font-family: 'Lora', serif; }
.conflict-card {
  background: #f2ede4;
  border: 1.5px solid #b09070;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 14px;
}
.conflict-card h4 { color: #5a3820; margin-bottom: 8px; font-family: 'Lora', serif; }
.winner-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #e0f0d8;
  color: #2a5220;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 700;
  margin-top: 8px;
}

/* ── Schedule calendar (employer) ── */
.sched-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.sched-day {
  background: #f0ebe0;
  border-radius: 8px;
  padding: 8px;
  min-height: 80px;
  font-size: 0.78rem;
  border: 1px solid rgba(180,148,100,0.15);
}
.sched-day .snum { font-weight: 700; color: #4a3220; font-size: 0.85rem; margin-bottom: 5px; font-family: 'Lora', serif; }
.sched-shift {
  padding: 3px 6px;
  border-radius: 5px;
  margin-bottom: 3px;
  font-size: 0.72rem;
  font-weight: 600;
}
.sched-shift.morning-s  { background: #f5f0e0; color: #7a4e10; }
.sched-shift.afternoon-s { background: #f0e8e0; color: #4a2810; }
.sched-shift.unassigned { background: #e8e0d0; color: #9a8068; font-style: italic; }

/* ── Success ── */
.success-icon { font-size: 3.5rem; margin-bottom: 16px; }
.success-msg { color: #64748b; margin-top: 10px; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #9a8068;
}
.empty-state .ei { font-size: 2.5rem; margin-bottom: 12px; }

/* ── Steps indicator ── */
.steps {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 28px;
}
.step {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: #94a3b8;
}
.step.active { color: #2563eb; }
.step.done { color: #16a34a; }
.step-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  background: #ddd6c8;
  color: #8a6a4a;
}
.step.active .step-dot { background: #3d6b2e; color: white; }
.step.done .step-dot { background: #2a5220; color: white; }
.step-line { flex: 1; height: 2px; background: #d4c9b0; min-width: 20px; }

/* ── Overlay ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 999;
  display: none;
}
#overlay.visible { display: block; }

/* ── Schedule table warnings ── */
.row-warn td { background: #f5ede0 !important; }

/* ── Section title ── */
.section-title {
  font-size: 0.78rem !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.8px !important;
  color: #7a5c3a !important;
  margin-bottom: 16px !important;
}

/* ── Falling Leaves ── */
.falling-leaf {
  position: fixed;
  top: -70px;
  pointer-events: none;
  z-index: 9999;
  animation: leafFall linear forwards;
  will-change: transform;
}

@keyframes leafFall {
  0%   { transform: translateY(0px)   rotate(0deg)   translateX(0px);  opacity: 0.92; }
  15%  { transform: translateY(15vh)  rotate(54deg)  translateX(28px);  }
  30%  { transform: translateY(30vh)  rotate(108deg) translateX(-18px); }
  45%  { transform: translateY(45vh)  rotate(162deg) translateX(32px);  }
  60%  { transform: translateY(60vh)  rotate(216deg) translateX(-22px); }
  75%  { transform: translateY(75vh)  rotate(270deg) translateX(18px);  }
  90%  { transform: translateY(90vh)  rotate(324deg) translateX(-12px); opacity: 0.7; }
  100% { transform: translateY(108vh) rotate(360deg) translateX(8px);  opacity: 0; }
}

/* ── Progress bar ── */
.progress-wrap { background: #d4c9b0; border-radius: 99px; height: 8px; width: 80px; display:inline-block; vertical-align:middle; margin-left:6px; }
.progress-fill { height: 8px; border-radius: 99px; background: #3d6b2e; }
.progress-fill.warn { background: #b07828; }
.progress-fill.danger { background: #8b3a2a; }

/* ── Print ── */
@media print {
  .topbar, .tab-bar, .btn, button { display: none !important; }
  body { background: white; }
  .card { box-shadow: none; }
}


.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
</style>
</head>
<body>

<div id="popover">
  <button class="pop-close" id="popClose">✕</button>
  <div style="font-size:0.78rem;font-weight:700;color:#94a3b8;padding:4px 6px 8px;border-bottom:1px solid #f1f5f9;margin-bottom:4px;" id="popTitle"></div>
  <button class="pop-btn pop-unavail"   onclick="App.setDay('unavailable')">❌ Cannot work</button>
  <button class="pop-btn pop-morning"   onclick="App.setDay('morning')">🌅 Prefer Morning <span style='font-size:0.75rem;color:#78350f;'>(07:00–14:00)</span></button>
  <button class="pop-btn pop-afternoon" onclick="App.setDay('afternoon')">🌆 Prefer Afternoon <span style='font-size:0.75rem;color:#4338ca;'>(13:00–20:00)</span></button>
  <button class="pop-btn pop-clear"     onclick="App.setDay('clear')">🔄 Clear</button>
</div>
<div id="overlay" onclick="App.closePopover()"></div>

<div id="app"></div>

<script>
const App = (() => {

  /* ── Constants ── */
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const SHIFTS = {
    morning:   { label: 'Morning',   hours: '07:00–14:00', color: '#f59e0b', cls: 'tag-amber' },
    afternoon: { label: 'Afternoon', hours: '13:00–20:00', color: '#6366f1', cls: 'tag-indigo' }
  };
  const STORAGE_KEY = 'shift_scheduler_v1';

  /* ── State ── */
  let state = {
    screen: 'home',
    workerName: '',
    contractHours: '',
    dayStates: {}, // { dayNum: 'unavailable'|'morning'|'afternoon' }
    workers: [],
    activeTab: 'submissions',
    generatedSchedule: null,
    selectedDay: null,
  };

  /* ── Helpers ── */
  function getNextMonth() {
    const now = new Date();
    let m = now.getMonth() + 1, y = now.getFullYear();
    if (m > 11) { m = 0; y++; }
    return { year: y, month: m };
  }

  const tm = getNextMonth();

  function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
  function firstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }

  function monthLabel() { return `${MONTH_NAMES[tm.month]} ${tm.year}`; }

  function load() {
    try { state.workers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { state.workers = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.workers));
  }

  function workerExists(name) {
    return state.workers.some(w => w.name.trim().toLowerCase() === name.trim().toLowerCase());
  }

  /* ── Render ── */
  function render() {
    const app = document.getElementById('app');
    switch (state.screen) {
      case 'home':           app.innerHTML = renderHome(); break;
      case 'worker-form':    app.innerHTML = renderWorkerForm(); break;
      case 'worker-calendar':app.innerHTML = renderWorkerCalendar(); break;
      case 'worker-review':  app.innerHTML = renderWorkerReview(); break;
      case 'worker-success': app.innerHTML = renderSuccess(); break;
      case 'employer':       app.innerHTML = renderEmployer(); break;
    }
  }

  /* ── Home ── */
  function renderHome() {
    return `
      <div class="screen">
        <div class="card" style="max-width:440px;text-align:center;">
          <div class="home-icon">🌿</div>
          <h1 style="font-family:'Lora',serif;letter-spacing:-0.3px;">Cafe Alma</h1>
          <p style="color:#7a5c3a;font-size:0.88rem;margin-top:4px;font-style:italic;font-family:'Lora',serif;">Shift Scheduler</p>
          <p class="home-month" style="margin-top:6px;">${monthLabel()}</p>
          <div class="home-actions" style="margin-top:32px;">
            <button class="btn btn-blue btn-large" onclick="App.goWorker()">👤 &nbsp; I'm an Employee</button>
            <button class="btn btn-indigo btn-large" onclick="App.goEmployer()">🏢 &nbsp; I'm the Employer</button>
          </div>
          <p class="worker-badge" style="margin-top:22px;">
            ${state.workers.length} employee${state.workers.length !== 1 ? 's' : ''} submitted for ${monthLabel()}
          </p>
        </div>
      </div>`;
  }

  /* ── Worker Form ── */
  function renderWorkerForm() {
    return `
      <div class="topbar">
        <span>📅 Shift Scheduler — ${monthLabel()}</span>
        <button class="back-btn" onclick="App.goHome()">← Back</button>
      </div>
      <div class="screen" style="padding-top:28px;">
        <div class="card">
          ${renderSteps(1)}
          <h2 style="margin-bottom:6px;">Employee Details</h2>
          <p style="color:#64748b;font-size:0.88rem;margin-bottom:24px;">Enter your name and contract information.</p>
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="wname" placeholder="e.g. Cafe Alma" value="${state.workerName}" />
          </div>
          <div class="field">
            <label>Contract Hours <span style="font-weight:400;color:#94a3b8;">(hours per week)</span></label>
            <input type="number" id="whours" min="1" max="60" placeholder="e.g. 40" value="${state.contractHours}" />
            <div class="hint">This helps build a fair schedule based on your contract.</div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button class="btn btn-blue" onclick="App.submitWorkerForm()">Continue →</button>
          </div>
        </div>
      </div>`;
  }

  /* ── Worker Calendar ── */
  function renderWorkerCalendar() {
    const totalDays  = daysInMonth(tm.year, tm.month);
    const firstDay   = firstDayOfMonth(tm.year, tm.month);
    const cells = [];

    // Empty cells before month start
    for (let i = 0; i < firstDay; i++) cells.push('<div class="day-cell empty"></div>');

    for (let d = 1; d <= totalDays; d++) {
      const s = state.dayStates[d] || 'normal';
      let label = '';
      if (s === 'unavailable') label = `<div class="day-label">OFF</div>`;
      if (s === 'morning')     label = `<div class="day-label">🌅 AM</div>`;
      if (s === 'afternoon')   label = `<div class="day-label">🌆 PM</div>`;
      cells.push(`
        <div class="day-cell ${s}" onclick="App.openPopover(event,${d})">
          <div class="day-num">${d}</div>${label}
        </div>`);
    }

    return `
      <div class="topbar">
        <span>📅 Shift Scheduler — ${monthLabel()}</span>
        <button class="back-btn" onclick="App.goWorkerForm()">← Back</button>
      </div>
      <div class="screen" style="padding-top:28px;">
        <div class="card card-wide">
          ${renderSteps(2)}
          <h2 style="margin-bottom:4px;">Mark Your Availability</h2>
          <p style="color:#64748b;font-size:0.88rem;margin-bottom:20px;">
            Hello, <strong>${state.workerName}</strong>! Tap any day to set your availability for <strong>${monthLabel()}</strong>.
          </p>
          <div class="cal-legend">
            <span><span class="dot dot-red"></span> Cannot work</span>
            <span><span class="dot dot-amber"></span> Prefer Morning (07:00–14:00)</span>

  /* ── Disputes Tab ── */
  function renderDisputes() {
    const totalDays = daysInMonth(tm.year, tm.month);
    const unavailDisputes   = [];
    const preferenceConflicts = [];

    for (let d = 1; d <= totalDays; d++) {
      // Unavailability disputes: 2+ workers unavailable same day
      const unavailWorkers = state.workers.filter(w => w.unavailableDays.includes(d));
      if (unavailWorkers.length >= 2) {
        unavailDisputes.push({ day: d, workers: unavailWorkers.map(w=>w.name) });
      }
      // Preference conflicts: 2+ workers prefer same shift same day
      const mornWorkers = state.workers.filter(w => (w.preferences||{})[d] === 'morning');
      const aftnWorkers = state.workers.filter(w => (w.preferences||{})[d] === 'afternoon');
      if (mornWorkers.length >= 2)
        preferenceConflicts.push({ day: d, shift: 'Morning', workers: mornWorkers.map(w=>w.name) });
      if (aftnWorkers.length >= 2)
        preferenceConflicts.push({ day: d, shift: 'Afternoon', workers: aftnWorkers.map(w=>w.name) });
    }

    if (!state.workers.length) return emptyState('No data yet', 'Disputes appear after employees submit their availability.');
    if (!unavailDisputes.length && !preferenceConflicts.length) {
      return `<div class="empty-state"><div class="ei">✅</div><p>No conflicts found! All availability looks good.</p></div>`;
    }

    let html = '';

    if (unavailDisputes.length) {
      html += `<div class="section-title" style="margin-bottom:14px;">⚠️ Unavailability Conflicts — Requires Manual Resolution</div>`;
      html += unavailDisputes.map(d => `
        <div class="dispute-card">
          <h4>📅 Day ${d.day} — ${MONTH_NAMES[tm.month]}</h4>
          <p style="font-size:0.87rem;color:#7c2d12;margin-bottom:6px;">${d.workers.length} employees are unavailable on this day and may leave shifts uncovered.</p>
          <div class="pill-row">${d.workers.map(n=>`<span class="tag tag-red">${n}</span>`).join('')}</div>
          <p style="font-size:0.8rem;color:#9a3412;margin-top:10px;">→ Please resolve this manually by contacting the employees involved.</p>
        </div>`).join('');
    }

    if (preferenceConflicts.length) {
      const resolved = getResolvedConflicts();
      html += `<div class="section-title" style="margin-top:24px;margin-bottom:14px;">🎲 Preference Conflicts — Randomly Resolved</div>`;
      html += preferenceConflicts.map(c => {
        const key = `${c.day}-${c.shift.toLowerCase()}`;
        const winner = resolved[key] || c.workers[0];
        return `
          <div class="conflict-card">
            <h4>📅 Day ${c.day} · ${c.shift} Shift (${c.shift === 'Morning' ? '07:00–14:00' : '13:00–20:00'})</h4>
            <p style="font-size:0.87rem;color:#5b21b6;margin-bottom:6px;">Multiple employees prefer this shift:</p>
            <div class="pill-row">${c.workers.map(n=>`<span class="tag" style="background:#ede9fe;color:#5b21b6;">${n}</span>`).join('')}</div>
            <div class="winner-badge">🎲 Randomly assigned to: ${winner}</div>

      }).join('');
    }

    return html;
  }

  function emptyState(title, msg) {

  /* ── Full Schedule Generator ── */
  function generateFullSchedule() {
    const totalDays  = daysInMonth(tm.year, tm.month);
    const SHIFT_HOURS = 7;
    const AVG_WEEKS   = 4.33;

    // Per-worker mutable state
    const ws = state.workers.map(w => ({
      name:          w.name,
      contractHours: w.contractHours,
      unavailableDays: w.unavailableDays,
      preferences:   w.preferences || {},
      targetShifts:  Math.round((w.contractHours * AVG_WEEKS) / SHIFT_HOURS),
      assignedShifts: 0,
    }));

    // Build empty day slots
    const schedule = {};
    for (let d = 1; d <= totalDays; d++) {
      const dow = new Date(tm.year, tm.month, d).getDay();
      const isWeekend = dow === 0 || dow === 6;
      schedule[d] = {
        morning:   [],
        afternoon: [],
        required:  isWeekend ? { morning: 3, afternoon: 5 } : { morning: 2, afternoon: 3 },
        dow,
        isWeekend,
      };
    }

    // Step 1 — lock in preferred shifts
    for (const w of ws) {
      for (const [dayStr, shift] of Object.entries(w.preferences)) {
        const d = +dayStr;
        if (d < 1 || d > totalDays) continue;
        if (w.unavailableDays.includes(d)) continue;
        if (shift !== 'morning' && shift !== 'afternoon') continue;
        if (schedule[d][shift].length < schedule[d].required[shift]) {
          schedule[d][shift].push(w.name);
          w.assignedShifts++;
        }
      }
    }

    // Step 2 — fill remaining slots greedily
    for (let d = 1; d <= totalDays; d++) {
      for (const shift of ['morning', 'afternoon']) {
        const needed = schedule[d].required[shift] - schedule[d][shift].length;
        if (needed <= 0) continue;

        const eligible = ws
          .filter(w =>
            !w.unavailableDays.includes(d) &&
            !schedule[d].morning.includes(w.name) &&
            !schedule[d].afternoon.includes(w.name) &&
            w.assignedShifts < w.targetShifts
          )
          .sort((a, b) =>
            (b.targetShifts - b.assignedShifts) - (a.targetShifts - a.assignedShifts)
          );

        for (const w of eligible.slice(0, needed)) {
          schedule[d][shift].push(w.name);
          w.assignedShifts++;
        }
      }
    }

    return { schedule, workerState: ws };
  }

  /* ── Conflict resolution (deterministic random per day) ── */
  function getResolvedConflicts() {
    const resolved = {};
    const totalDays = daysInMonth(tm.year, tm.month);
    for (let d = 1; d <= totalDays; d++) {
      ['morning','afternoon'].forEach(shift => {
        const key = `${d}-${shift}`;
        const candidates = state.workers.filter(w =>
          !w.unavailableDays.includes(d) && (w.preferences||{})[d] === shift
        );
        if (candidates.length >= 2) {
          // Seeded pseudo-random using day + first char codes of names
          const seed = d * 31 + candidates.reduce((acc,w)=>acc+w.name.charCodeAt(0),0);
          const idx  = seed % candidates.length;
          resolved[key] = candidates[idx].name;
        }
      });
    }
    return resolved;
  }

    </style></head><body>

    <h2>⚠ Disputes — Days Requiring Manual Resolution</h2>
    ${disputeRows
      ? `<table class="disputes"><thead><tr><th>Day</th><th>Unavailable Workers</th><th>Count</th></tr></thead><tbody>${disputeRows}</tbody></table>`
      : `<div class="no-disputes">✅ No unavailability disputes found.</div>`}

    <h2>📊 Hours & Shift Fulfillment</h2>
    <table>
      <thead><tr><th>Name</th><th>Contract</th><th>Target Shifts</th><th>Assigned</th><th>Total Hours</th><th>Fulfillment</th></tr></thead>
      <tbody>${workerSummaryRows || '<tr><td colspan="6" style="color:#94a3b8;">No workers.</td></tr>'}</tbody>
    </table>

    <h2>📆 Full Schedule — ${ml}</h2>
    <p style="font-size:10px;color:#64748b;margin-bottom:8px;">Weekday: 2 morning + 3 afternoon &nbsp;·&nbsp; Weekend: 3 morning + 5 afternoon</p>
    <table class="schedule">
      <thead><tr><th>Date</th><th>Day</th><th>Morning (07:00–14:00)</th><th>Afternoon (13:00–20:00)</th></tr></thead>
      <tbody>${schedRows}</tbody>
    </table>

    <div class="footer">Generated by Shift Scheduler · ${new Date().toLocaleDateString()}</div>
    <script>window.onload = function(){ window.print(); }<\/script>
    </body></html>`;

    const win = window.open('', '_blank');
    if (!win) { alert('Please allow pop-ups for this page to export PDF.'); return; }
    win.document.write(html);
    win.document.close();
  }

  /* ── Popover ── */
  function openPopover(e, day) {
    e.stopPropagation();
    state.selectedDay = day;
    const pop = document.getElementById('popover');
    const ov  = document.getElementById('overlay');
    document.getElementById('popTitle').textContent = `Day ${day} — ${MONTH_NAMES[tm.month]}`;
    pop.classList.add('visible');
    ov.classList.add('visible');

    // Position near click
    const rect = e.currentTarget.getBoundingClientRect();
    let left = rect.left + window.scrollX;
    let top  = rect.bottom + 6 + window.scrollY;
    if (left + 210 > window.innerWidth) left = window.innerWidth - 220;
    if (top + 200 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 210;
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
  }

  function closePopover() {
    document.getElementById('popover').classList.remove('visible');
    document.getElementById('overlay').classList.remove('visible');
    state.selectedDay = null;
  }

  function setDay(type) {
    const d = state.selectedDay;
    if (!d) return;
    if (type === 'clear') delete state.dayStates[d];
    else state.dayStates[d] = type;
    closePopover();
    render();
  }

  /* ── Navigation ── */
  function goHome()       { state.screen = 'home'; render(); }
  function goWorker()     { state.workerName = ''; state.contractHours = ''; state.dayStates = {}; state.screen = 'worker-form'; render(); }
  function goWorkerForm() { state.screen = 'worker-form'; render(); }
  function goCalendar()   { state.screen = 'worker-calendar'; render(); }
  function goEmployer()   { state.screen = 'employer'; state.activeTab = 'submissions'; render(); }
  function setTab(t)      { state.activeTab = t; render(); }

  function submitWorkerForm() {
    const name  = document.getElementById('wname').value.trim();
    const hours = document.getElementById('whours').value.trim();
    if (!name)  { alert('Please enter your name.'); return; }
    if (!hours || isNaN(hours) || +hours < 1) { alert('Please enter valid contract hours.'); return; }
    state.workerName    = name;
    state.contractHours = +hours;
    state.dayStates     = {};
    // Pre-fill if existing submission
    const existing = state.workers.find(w => w.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      existing.unavailableDays.forEach(d => state.dayStates[d] = 'unavailable');
      Object.entries(existing.preferences || {}).forEach(([k,v]) => state.dayStates[+k] = v);
      state.contractHours = existing.contractHours;
    }
    state.screen = 'worker-calendar';
    render();
  }

  function goReview() {
    state.screen = 'worker-review';
    render();
  }

  function submitWorker() {
    const unavailableDays = Object.entries(state.dayStates)
      .filter(([,v]) => v === 'unavailable').map(([k]) => +k);
    const preferences = {};
    Object.entries(state.dayStates)
      .filter(([,v]) => v === 'morning' || v === 'afternoon')
      .forEach(([k,v]) => preferences[+k] = v);

    const submission = {
      name: state.workerName,
      contractHours: state.contractHours,
      unavailableDays,
      preferences,
      submittedAt: new Date().toISOString(),
    };

    // Update or add
    const idx = state.workers.findIndex(w => w.name.toLowerCase() === state.workerName.toLowerCase());
    if (idx >= 0) state.workers[idx] = submission;
    else state.workers.push(submission);

    save();
    state.screen = 'worker-success';
    render();
  }

  function clearAll() {
    if (!confirm('Delete all employee submissions? This cannot be undone.')) return;
    state.workers = [];
    save();
    render();
  }

  /* ── Init ── */
  function init() {
    load();
    render();
    document.getElementById('popClose').addEventListener('click', closePopover);
  }

  return {
    init, goHome, goWorker, goWorkerForm, goCalendar, goReview,
    goEmployer, setTab, submitWorkerForm, goReview,
    submitWorker, openPopover, closePopover, setDay,
    clearAll, exportPDF,
  };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
<script>
// ── Falling Leaves ──
(function () {
  const LEAF_SHAPES = [
    // Classic leaf
    'M10 1 C5 1 1 5 1 11 C1 17 5 22 10 24 C15 22 19 17 19 11 C19 5 15 1 10 1 Z',
    // Rounded leaf
    'M10 2 C4 2 1 7 1 12 C1 17 4 22 10 23 C16 22 19 17 19 12 C19 7 16 2 10 2 Z',
    // Narrower leaf
    'M10 1 C7 3 2 8 2 13 C2 18 6 23 10 24 C14 23 18 18 18 13 C18 8 13 3 10 1 Z',
  ];
  const VEIN = 'M10 2 Q11 12 10 23';
  const COLORS = [
    ['#5a8a3c','#4a7a2c'],  // medium green
    ['#3d6b2e','#2d5b1e'],  // dark green
    ['#7aaa52','#6a9a42'],  // light green
    ['#8a9a3a','#7a8a2a'],  // olive
    ['#c8a040','#b89030'],  // amber / turning
    ['#a06030','#905020'],  // warm brown
  ];

  function spawnLeaf() {
    const leaf   = document.createElement('div');
    leaf.className = 'falling-leaf';

    const [fill, vein] = COLORS[Math.floor(Math.random() * COLORS.length)];
    const shape = LEAF_SHAPES[Math.floor(Math.random() * LEAF_SHAPES.length)];
    const size  = 16 + Math.random() * 18;
    const tilt  = (Math.random() - 0.5) * 60;

    leaf.innerHTML = `<svg width="${size}" height="${size * 1.25}"
      viewBox="0 0 20 25" xmlns="http://www.w3.org/2000/svg"
      style="transform:rotate(${tilt}deg)">
      <path d="${shape}" fill="${fill}" opacity="0.88"/>
      <path d="${VEIN}" fill="none" stroke="${vein}" stroke-width="0.7" opacity="0.55"/>
    </svg>`;

    leaf.style.left = (Math.random() * 102) + 'vw';
    const dur = 12 + Math.random() * 14;
    leaf.style.animationDuration = dur + 's';
    document.body.appendChild(leaf);
    leaf.addEventListener('animationend', () => leaf.remove());
  }

  // Initial burst
  document.addEventListener('DOMContentLoaded', () => {
    for (let i = 0; i < 7; i++) setTimeout(spawnLeaf, i * 700);
    setInterval(spawnLeaf, 2200);
  });
})();
</script>
</body>
</html>
